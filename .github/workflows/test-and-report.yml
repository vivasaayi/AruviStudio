name: Test And Report

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Prepare report directories
        run: mkdir -p reports/rust-unit reports/rust-integration reports/playwright

      - name: Run Rust unit tests
        id: rust_unit
        run: |
          set +e
          npm run unit-test
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Rust integration tests
        id: rust_integration
        run: |
          set +e
          npm run integration-test
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Playwright UI tests
        id: ui_tests
        run: |
          set +e
          npm run e2e-tests
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish Rust unit results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Rust Unit Tests
          path: reports/rust-unit/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Publish Rust integration results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Rust Integration Tests
          path: reports/rust-integration/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Publish UI results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright UI Tests
          path: reports/playwright/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload combined test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports
          if-no-files-found: warn
          retention-days: 14

      - name: Add markdown summary
        if: always()
        run: cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if any suite failed
        if: always()
        run: |
          if [[ "${{ steps.rust_unit.outputs.status }}" != "0" || \
                "${{ steps.rust_integration.outputs.status }}" != "0" || \
                "${{ steps.ui_tests.outputs.status }}" != "0" ]]; then
            echo "One or more test suites failed."
            exit 1
          fi
